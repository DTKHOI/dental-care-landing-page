    <body style="height: 5000px">
        <header class="header">
            <div class="content">
                <div class="container">
                    <a href="">
                        <div class="logo">
                            <span class="logo__circle"></span>
                            <span class="logo__text">
                                <span class="logo__brand">Shine</span>
                                <span class="logo__brand logo__brand--small">

                            </span>
                        </div>

                    <nav class="navbar">
                        <ul class="navbar-list">
                            <li class="navbar__item navbar__item--active">

                                >

                                </a>
                            </li>

                        <h1 class="hero__heading">
                            Exceptional dental care for all ages.
                        </h1>
                        <div class="hero__desc">
                            Exceptional dental care for all ages. Your great
                            smile begins with a great dentist.
                        </div>
                        <div class="hero__actions">
                            <a href="#!" class="btn hero__btn">Book Online</a>
                            <span class="hero__phone-number"
                                >or call (123) 456-7890</span
                            >
                        </div>
                    </div>
                    <div class="hero__media">
                        <figure class="hero__images">
                            <img
                                src="./assets/img/hero-img-1.jpg"
                                alt="Exceptional dental care for all ages."
                                class="hero__img hero__img--big"
                            />
                            <img
                                src="./assets/img/hero-img-2.jpg"
                                alt="Exceptional dental care for all ages."
                                class="hero__img hero__img--small"
